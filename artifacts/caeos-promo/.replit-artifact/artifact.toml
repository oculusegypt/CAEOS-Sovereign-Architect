kind = "video"
previewPath = "/caeos-promo/"
title = "CAEOS Promo Video"
version = "1.0.0"
id = "artifacts/caeos-promo"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/caeos-promo/" ]
localPort = 19615

[services.development]
run = "pnpm --filter @workspace/caeos-promo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/caeos-promo", "run", "build" ]
publicDir = "artifacts/caeos-promo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19615"
BASE_PATH = "/caeos-promo/"
